<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div id="mainView">
    <div class="row">
      <button class="action-btn" id="deleteBtn">Delete All Chats</button>
      <button class="stop-btn" id="stopDeleteBtn" title="Stop deleting">
        <span class="square"></span>
      </button>
    </div>

    <div class="row">
      <button class="action-btn photo-delete-btn" id="deletePhotosBtn">Delete All Story Photos</button>
      <button class="stop-btn" id="stopPhotosBtn" title="Stop deleting photos">
        <span class="square"></span>
      </button>
    </div>

    <button id="coffeeBtn">Donate Me a Dollar?</button>
    <div id="status">Ready</div>
  </div>

  <div id="qrView">
    <img src="qr_code.jpg" alt="Buy me a coffee QR code">
    <button id="backBtn">← Back</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
